name: Backend CI

on:
  pull_request:
    paths: ["backend/**", "analytics/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["backend/**", "analytics/**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: yezz123/setup-uv@v1
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/
      - run: uv run bandit -c pyproject.toml -r src/
      - run: uv run safety check

  test:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: yezz123/setup-uv@v1
      - run: uv sync --frozen
      - run: uv run pytest --cov --cov-fail-under=80 --ignore=tests/test_dbt_integration.py

  dbt-integration:
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: yezz123/setup-uv@v1
      - run: uv sync --frozen
      - run: uv run pytest tests/test_dbt_integration.py -v