name: Docker CI

on:
  pull_request:
    paths:
      - ".github/workflows/docker-ci.yml"
      - ".dockerignore"
      - "analytics/**"
      - "backend/**"
      - "frontend/**"
      - "docker/**"
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/docker-compose.yml build
      - run: docker compose -f docker/docker-compose.yml run --rm backend uv run pytest --cov --cov-fail-under=80 --ignore=tests/test_dbt_integration.py
