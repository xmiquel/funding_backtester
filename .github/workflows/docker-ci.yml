name: Docker CI

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose run --rm backend uv run pytest