# OpenSpec Configuration — funding_backtester
# Auto-generated by sdd-init on 2026-06-27
# Do not edit manually — regenerate with `sdd-init` when context changes

context: >
  Full-stack funding backtesting platform. Backend: Python 3.12+, FastAPI,
  SQLAlchemy async + asyncpg, Pydantic v2, Alembic. Frontend: React 19 + TypeScript
  strict, Vite 6, Tailwind CSS, shadcn/ui, TanStack Query, Zustand.

strict_tdd: true

testing:
  backend:
    runner: pytest
    framework: pytest 8+ with pytest-asyncio
    command: "uv run pytest"
    layers:
      unit: { available: true, tool: pytest }
      integration: { available: true, tool: "httpx AsyncClient + ASGITransport" }
      e2e: { available: false, tool: "--" }
    coverage:
      available: true
      tool: pytest-cov
      command: "uv run pytest --cov --cov-fail-under=80"
      threshold: 80
    quality:
      linter: { available: true, tool: ruff, command: "uv run ruff check src/ tests/" }
      type_checker: { available: true, tool: "mypy --strict", command: "uv run mypy src/" }
      formatter: { available: true, tool: "ruff format", command: "uv run ruff format src/ tests/" }
      security: { available: true, tool: bandit, command: "uv run bandit -c pyproject.toml -r src/" }
      safety: { available: true, tool: safety, command: "uv run safety check" }
  frontend:
    runner: vitest
    framework: Vitest 2+ with @testing-library/react + jsdom
    command: "pnpm --filter frontend test"
    layers:
      unit: { available: true, tool: "vitest + @testing-library/react" }
      integration: { available: true, tool: "vitest mocks on axios" }
      e2e: { available: false, tool: "--" }
    coverage:
      available: false
      tool: vitest --coverage
      command: "--"
    quality:
      linter: { available: true, tool: eslint 9, command: "pnpm --filter frontend exec eslint src/" }
      type_checker: { available: true, tool: "tsc --noEmit", command: "pnpm --filter frontend exec tsc -b --noEmit" }
      formatter: { available: true, tool: prettier, command: "pnpm --filter frontend exec prettier src/" }

phases:
  proposal:
    skill: sdd-propose
    pre: brainstorming
  spec:
    skill: sdd-spec
  design:
    skill: sdd-design
  tasks:
    skill: sdd-tasks
  apply:
    skill: sdd-apply
    tdd: true
  verify:
    skill: sdd-verify
  archive:
    skill: sdd-archive
